<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <title>MedAdmin Pro — Dr.Samichelly</title>
  <style>/* ── RESET & BASE ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:       #1B4F8A;
  --blue-light: #EBF2FA;
  --blue-mid:   #A8C8EE;
  --green:      #0D6B4F;
  --green-light:#E4F4EE;
  --amber:      #8A5200;
  --amber-light:#FDF0DC;
  --red:        #B03030;
  --red-light:  #FDEAEA;
  --text:       #111827;
  --text-2:     #4B5563;
  --text-3:     #9CA3AF;
  --border:     rgba(0,0,0,.08);
  --border-2:   rgba(0,0,0,.15);
  --bg:         #F8F9FB;
  --bg-2:       #EFF1F5;
  --white:      #ffffff;
  --sidebar:    #0F1E35;
  --sidebar-text: #94A3B8;
  --sidebar-active: #3B82F6;
  --radius:     8px;
  --radius-lg:  14px;
}

body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* ── LOGIN ─────────────────────────────────────────────── */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-wrap { width: 100%; max-width: 380px; }
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo-title { font-size: 20px; font-weight: 600; color: var(--text); }
.login-logo-sub { font-size: 13px; color: var(--text-2); margin-top: 4px; }
.login-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
.login-card h2 { font-size: 15px; font-weight: 500; margin-bottom: 20px; text-align: center; }
.login-error { background: var(--red-light); color: var(--red); border-radius: var(--radius); padding: 10px 12px; font-size: 13px; margin-bottom: 14px; }
.btn-login { width: 100%; padding: 10px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; }
.btn-login:hover { background: #0C447C; }
.btn-login:disabled { opacity: .6; cursor: not-allowed; }
.login-hint { font-size: 11px; color: var(--text-3); text-align: center; margin-top: 14px; }

/* ── APP SHELL ─────────────────────────────────────────── */
#app-shell { display: none; flex-direction: row; height: 100vh; }
#app-shell.visible { display: flex; }

/* ── SIDEBAR ───────────────────────────────────────────── */
.sidebar { width: 240px; min-width: 240px; background: var(--sidebar); border-right: none; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
.sidebar-logo { padding: 22px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
.logo-title { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -.01em; }
.logo-sub { font-size: 11px; color: #64748B; margin-top: 3px; }
.role-tag { display: inline-flex; align-items: center; margin-top: 8px; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
.role-tag.medecin { background: rgba(59,130,246,.15); color: #93C5FD; border: 1px solid rgba(59,130,246,.25); }
.role-tag.secretaire { background: rgba(16,185,129,.15); color: #6EE7B7; border: 1px solid rgba(16,185,129,.25); }
.nav-section { padding: 16px 16px 4px; font-size: 10px; font-weight: 600; color: #334155; letter-spacing: .1em; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; margin: 1px 8px; border-radius: var(--radius); cursor: pointer; color: var(--sidebar-text); font-size: 13px; transition: all .15s; }
.nav-item:hover { background: rgba(255,255,255,.07); color: #CBD5E1; }
.nav-item.active { background: rgba(59,130,246,.2); color: #60A5FA; font-weight: 500; border-left: 2px solid #3B82F6; margin-left: 8px; padding-left: 12px; }
.nav-item.active.sec { background: rgba(16,185,129,.15); color: #34D399; border-left: 2px solid #10B981; }
.nav-item i { font-size: 16px; width: 18px; text-align: center; }
.sidebar-footer { margin-top: auto; padding: 12px 10px; border-top: 1px solid rgba(255,255,255,.08); }
.user-badge { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); background: rgba(255,255,255,.05); cursor: pointer; }
.user-badge:hover { background: rgba(255,255,255,.09); }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.av-m { background: #1D4ED8; color: #fff; }
.av-s { background: #047857; color: #fff; }
.user-name { font-size: 12px; font-weight: 600; color: #E2E8F0; }
.user-role { font-size: 11px; color: #64748B; }

/* ── MAIN ──────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar { padding: 0 28px; height: 56px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.topbar-title { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.content { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* ── BUTTONS ───────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius); border: 0.5px solid var(--border-2); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit; }
.btn:hover { background: var(--bg-2); }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: #0C447C; border-color: #0C447C; }
.btn-green { background: var(--green); color: #fff; border-color: var(--green); }
.btn-green:hover { background: #085041; }
.btn-danger { background: var(--red); color: #fff; border-color: var(--red); }
.btn-sm { padding: 3px 9px; font-size: 11px; }

/* ── CARDS ─────────────────────────────────────────────── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 22px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 13px; font-weight: 500; }
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.metric-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.metric-label { font-size: 11px; color: var(--text-3); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; }
.metric-value { font-size: 26px; font-weight: 700; line-height: 1; color: var(--text); }
.metric-delta { font-size: 11px; margin-top: 5px; color: var(--text-2); }
.delta-up { color: #3B6D11; }
.delta-dn { color: var(--red); }
.two-col { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; }

/* ── TABLE ─────────────────────────────────────────────── */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 500; color: var(--text-2); text-transform: uppercase; letter-spacing: .05em; border-bottom: 0.5px solid var(--border); }
.data-table td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg); }
.empty-row td { text-align: center; color: var(--text-3); font-style: italic; padding: 24px; }

/* ── BADGES ────────────────────────────────────────────── */
.badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.b-ok     { background: #EAF3DE; color: #3B6D11; }
.b-wait   { background: var(--amber-light); color: var(--amber); }
.b-info   { background: var(--blue-light); color: var(--blue); }
.b-danger { background: var(--red-light); color: var(--red); }
.b-gray   { background: var(--bg-2); color: var(--text-2); }

/* ── FORM FIELDS ───────────────────────────────────────── */
.field { margin-bottom: 12px; }
.field label { font-size: 11px; color: var(--text-2); display: block; margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
.field input, .field select, .field textarea {
  width: 100%; padding: 8px 11px; border-radius: var(--radius); border: 0.5px solid var(--border-2);
  background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; outline: none;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--blue); background: var(--white); }
.field textarea { resize: vertical; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── MODAL ─────────────────────────────────────────────── */
#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 24px; width: 460px; max-width: 95%; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 18px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 0.5px solid var(--border); }

/* ── PLANNING GRID ─────────────────────────────────────── */
.week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.week-grid { display: grid; grid-template-columns: 55px repeat(5, 1fr); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; font-size: 12px; }
.wh { background: var(--bg-2); padding: 8px 6px; text-align: center; font-weight: 500; font-size: 11px; color: var(--text-2); border-bottom: 0.5px solid var(--border); }
.wt { background: var(--bg-2); padding: 6px 8px; color: var(--text-3); font-size: 11px; border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); }
.ws { min-height: 40px; border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); padding: 2px; }
.ws:last-child { border-right: none; }
.ap { border-radius: 4px; padding: 3px 5px; font-size: 11px; cursor: pointer; line-height: 1.3; margin: 1px; }
.ap-b { background: var(--blue-mid); color: #0C447C; }
.ap-t { background: #9FE1CB; color: #085041; }
.ap-a { background: #FAC775; color: #633806; }
.ap-r { background: #F5C4B3; color: #712B13; }
.week-legend { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: var(--text-2); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }

/* ── DOSSIERS ──────────────────────────────────────────── */
.dossier-grid { display: grid; grid-template-columns: 220px 1fr; gap: 16px; }
.patient-list-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid transparent; margin-bottom: 2px; }
.patient-list-item:hover { background: var(--bg); }
.patient-list-item.selected { background: var(--blue-light); border-color: var(--blue-mid); }
.p-av { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
.section-block { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
.section-block-title { font-size: 11px; font-weight: 500; color: var(--text-2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }

/* ── AI PANEL ──────────────────────────────────────────── */
.ai-messages { max-height: 220px; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
.ai-msg { padding: 9px 12px; border-radius: var(--radius); font-size: 13px; line-height: 1.5; max-width: 88%; }
.ai-msg.assistant { background: var(--bg-2); align-self: flex-start; }
.ai-msg.user { background: var(--blue-light); color: #0C447C; align-self: flex-end; }
.ai-input-row { display: flex; gap: 8px; }
.ai-txt { flex: 1; padding: 8px 12px; border-radius: var(--radius); border: 0.5px solid var(--border-2); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; outline: none; }
.ai-txt:focus { border-color: var(--blue); }
.ai-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

/* ── BAR CHART ─────────────────────────────────────────── */
.bar-chart { display: flex; align-items: flex-end; gap: 10px; height: 100px; padding: 0 4px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
.bar-col-inner { flex: 1; width: 100%; display: flex; align-items: flex-end; }
.bar-fill { width: 100%; border-radius: 3px 3px 0 0; }
.bar-label { font-size: 10px; color: var(--text-2); }
.mini-bar { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
.mini-bar-label { width: 100px; font-size: 12px; color: var(--text-2); flex-shrink: 0; }
.mini-bar-track { flex: 1; height: 6px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 3px; }

/* ── ALERTS ────────────────────────────────────────────── */
.alert-item { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 8px 10px; background: var(--bg); border-radius: var(--radius); margin-bottom: 6px; }

/* ── SEARCH BAR ────────────────────────────────────────── */
.search-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 0.5px solid var(--border-2); border-radius: var(--radius); margin-bottom: 14px; background: var(--white); }
.search-bar input { border: none; outline: none; background: transparent; font-size: 13px; flex: 1; color: var(--text); font-family: inherit; }

/* ── TOAST ─────────────────────────────────────────────── */
#toast { position: fixed; bottom: 24px; right: 24px; background: #222; color: #fff; padding: 10px 18px; border-radius: var(--radius); font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 300; }
#toast.show { opacity: 1; }

/* ── LOADING ───────────────────────────────────────────── */
.loading { color: var(--text-3); font-style: italic; padding: 20px; text-align: center; font-size: 13px; }
</style>

  <div id="app-shell">

  <script>
// ══════════════════════════════════════════════════════════
//  CONFIG SUPABASE — À remplir avec vos clés
//  Créez un compte sur https://supabase.com
//  Puis copiez vos clés depuis : Project Settings → API
// ══════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://esdzbjnlkyqvnuzyyooj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZHpiam5sa3lxdm51enl5b29qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTYwMjEsImV4cCI6MjA5NzY5MjAyMX0.AIYNqfrddwS5kPcROwQBNAQmQ0EBZ7lChyYQGLuq1ZE';

// Initialisation du client Supabase
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── AUTH ──────────────────────────────────────────────────
// Gère la connexion, déconnexion et le rôle utilisateur

let currentUser = null;
let currentRole = null;

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value.trim();
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('btn-login');

  errEl.style.display = 'none';
  if (!email || !pass) {
    errEl.textContent = 'Veuillez remplir tous les champs.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Connexion…';

  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });

  btn.disabled = false;
  btn.textContent = 'Se connecter';

  if (error) {
    errEl.textContent = 'Identifiants incorrects. Vérifiez votre email et mot de passe.';
    errEl.style.display = 'block';
    return;
  }

  currentUser = data.user;
  // Le rôle est stocké dans les métadonnées utilisateur (défini à la création du compte)
  currentRole = data.user.user_metadata?.role || 'secretaire';
  launchApp();
}

async function logout() {
  await db.auth.signOut();
  currentUser = null;
  currentRole = null;
  document.getElementById('app-shell').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
}

// Vérifie si une session existe déjà au chargement
async function checkSession() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    currentUser = session.user;
    currentRole = session.user.user_metadata?.role || 'secretaire';
    launchApp();
  }
}

// ── DATABASE ──────────────────────────────────────────────
// Toutes les requêtes Supabase centralisées ici

// ── PATIENTS ──
async function getPatients(search = '') {
  let query = db.from('patients').select('*').order('nom');
  if (search) query = query.ilike('nom', `%${search}%`);
  const { data, error } = await query;
  if (error) { console.error(error); return []; }
  return data;
}

async function getPatient(id) {
  const { data, error } = await db.from('patients').select('*').eq('id', id).single();
  if (error) { console.error(error); return null; }
  return data;
}

async function createPatient(patient) {
  const { data, error } = await db.from('patients').insert([patient]).select().single();
  if (error) throw error;
  return data;
}

async function updatePatient(id, fields) {
  const { error } = await db.from('patients').update(fields).eq('id', id);
  if (error) throw error;
}

// ── RENDEZ-VOUS ──
async function getRdvByDate(dateStr) {
  const { data, error } = await db
    .from('rendez_vous')
    .select('*, patients(nom, age)')
    .eq('date', dateStr)
    .order('heure');
  if (error) { console.error(error); return []; }
  return data;
}

async function getRdvByWeek(dateDebut, dateFin) {
  const { data, error } = await db
    .from('rendez_vous')
    .select('*, patients(nom, age)')
    .gte('date', dateDebut)
    .lte('date', dateFin)
    .order('date').order('heure');
  if (error) { console.error(error); return []; }
  return data;
}

async function createRdv(rdv) {
  const { data, error } = await db.from('rendez_vous').insert([rdv]).select().single();
  if (error) throw error;
  return data;
}

async function updateRdv(id, fields) {
  const { error } = await db.from('rendez_vous').update(fields).eq('id', id);
  if (error) throw error;
}

async function deleteRdv(id) {
  const { error } = await db.from('rendez_vous').delete().eq('id', id);
  if (error) throw error;
}

// ── FACTURES ──
async function getFactures() {
  const { data, error } = await db
    .from('factures')
    .select('*, patients(nom)')
    .order('date', { ascending: false });
  if (error) { console.error(error); return []; }

// ── STATS ──
async function getStatsMois() {
  const now = new Date();
  const debut = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const fin   = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().slice(0,10);

  const [rdvRes, factRes, patientsRes] = await Promise.all([
    db.from('rendez_vous').select('id', { count: 'exact' }).gte('date', debut).lte('date', fin),
    db.from('factures').select('montant, statut').gte('date', debut).lte('date', fin),
    db.from('patients').select('id', { count: 'exact' })
  ]);

  const totalRdv = rdvRes.count || 0;
  const totalPatients = patientsRes.count || 0;
  const factures = factRes.data || [];
  const revenus = factures.filter(f => f.statut === 'payee').reduce((s, f) => s + (f.montant || 0), 0);
  const impayees = factures.filter(f => f.statut === 'impayee' || f.statut === 'en_attente').length;

  return { totalRdv, totalPatients, revenus, impayees };
}

function avatarInitials(nom) {
  if (!nom) return '?';
  const parts = nom.trim().split(' ');
  return (parts[0][0] + (parts[1]?.[0] || '')).toUpperCase();
}

const AV_COLORS = [
  ['#E6F1FB','#185FA5'], ['#E1F5EE','#0F6E56'],
  ['#FAEEDA','#854F0B'], ['#FCEBEB','#A32D2D'],
  ['#EAF3DE','#3B6D11'], ['#EEEDFE','#534AB7'],
];

function avatarColor(str) {
  let hash = 0;
  for (let c of (str || '')) hash = c.charCodeAt(0) + ((hash << 5) - hash);
  return AV_COLORS[Math.abs(hash) % AV_COLORS.length];
}

function badgeStatut(statut) {
  const map = {
    confirme:   ['b-ok',     'Confirmé'],
    en_attente: ['b-wait',   'En attente'],
    urgent:     ['b-danger', 'Urgent'],
    nouveau:    ['b-info',   'Nouveau'],
    payee:      ['b-ok',     'Payée'],
    impayee:    ['b-danger', 'Impayée'],
    annule:     ['b-gray',   'Annulé'],
  };
  const [cls, label] = map[statut] || ['b-gray', statut];
  return `<span class="badge ${cls}">${label}</span>`;
}

function typeApColor(type) {
  if (!type) return 'ap-b';
  const t = type.toLowerCase();
  if (t.includes('urgent') || t.includes('urgence')) return 'ap-r';
  if (t.includes('suivi'))  return 'ap-t';
  if (t.includes('bilan') || t.includes('préop') || t.includes('preop')) return 'ap-a';
  return 'ap-b';
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('fr-FR');
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function weekRange(offset = 0) {
  const now = new Date();
  const day = now.getDay() || 7;
  const mon = new Date(now);
  mon.setDate(now.getDate() - day + 1 + offset * 7);
  const fri = new Date(mon);
  fri.setDate(mon.getDate() + 4);
  return {
    debut: mon.toISOString().slice(0,10),
    fin:   fri.toISOString().slice(0,10),
    label: `${mon.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} – ${fri.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}`
  };
}

async function renderPlanning() {
  const el = document.getElementById('page-planning');
  el.innerHTML = '<div class="loading">Chargement…</div>';

  const range = weekRange(weekOffset);
  const rdvs  = await getRdvByWeek(range.debut, range.fin);

  const days = ['Lun','Mar','Mer','Jeu','Ven'];
  const dates = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(range.debut);
    d.setDate(d.getDate() + i);
    dates.push(d);
  }

  const hours = ['08h','09h','10h','11h','12h','13h','14h','15h','16h','17h'];

  function rdvsAt(dateStr, h) {
    return rdvs.filter(r => r.date === dateStr && r.heure?.startsWith(h.replace('h',':')));
  }

  el.innerHTML = `
    <div class="week-nav">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn" onclick="weekOffset--;renderPlanning()"><i class="ti ti-chevron-left"></i></button>
        <span style="font-size:13px;font-weight:500">${range.label}</span>
        <button class="btn" onclick="weekOffset++;renderPlanning()"><i class="ti ti-chevron-right"></i></button>
        <button class="btn" onclick="weekOffset=0;renderPlanning()">Aujourd'hui</button>
      </div>
      <button class="btn btn-primary" onclick="openModalRdv()"><i class="ti ti-plus"></i>Nouveau RDV</button>
    </div>
    <div class="week-grid">
      <div class="wh"></div>
      ${dates.map((d,i) => `<div class="wh">${days[i]} ${d.getDate()}</div>`).join('')}
      ${hours.map(h => `
        <div class="wt">${h}</div>
        ${dates.map(d => {
          const ds = d.toISOString().slice(0,10);
          const slots = rdvsAt(ds, h);
          return `<div class="ws">${slots.map(r =>
            `<div class="ap ${typeApColor(r.type)}" onclick="openModalRdv('${r.id}')">${r.patients?.nom?.split(' ')[0] || '?'}<br>${r.type||''}</div>`
          ).join('')}</div>`;
        }).join('')}
      `).join('')}
    </div>
    <div class="week-legend">
      <span><span class="legend-dot" style="background:#B5D4F4"></span>Consultation</span>
      <span><span class="legend-dot" style="background:#9FE1CB"></span>Suivi</span>
      <span><span class="legend-dot" style="background:#FAC775"></span>Préop/Bilan</span>
      <span><span class="legend-dot" style="background:#F5C4B3"></span>Urgence</span>
    </div>`;
}

    </div>

      <div class="field"><label>Type</label>
        <select id="f-type">
          ${['Consultation','Suivi post-op','Bilan préopératoire','Chirurgie','Urgence'].map(t =>

          ).join('')}
        </select>
      </div>
      <div class="field"><label>Statut</label>
        <select id="f-statut">
          ${[['confirme','Confirmé'],['en_attente','En attente'],['urgent','Urgent'],['nouveau','Nouveau'],['annule','Annulé']].map(([v,l]) =>
            `<option value="${v}" ${rdv?.statut === v ? 'selected' : ''}>${l}</option>`
          ).join('')}

async function sauvegarderRdv(rdvId) {
  const payload = {
    patient_id:  document.getElementById('f-patient').value,
    date:        document.getElementById('f-date').value,
    heure:       document.getElementById('f-heure').value + ':00',
    type:        document.getElementById('f-type').value,
    statut:      document.getElementById('f-statut').value,
    notes:       document.getElementById('f-notes').value,
  };
  try {
    if (rdvId) await updateRdv(rdvId, payload);
    else await createRdv(payload);
    closeModal();
    showToast(rdvId ? 'RDV mis à jour' : 'RDV créé');
    loadPageData(document.querySelector('.nav-item.active')?.id?.replace('nav-', '') || 'planning');
  } catch (e) {
    showToast('Erreur : ' + e.message);
  }
}

async function supprimerRdv(id) {
  if (!confirm('Supprimer ce rendez-vous ?')) return;
  await deleteRdv(id);
  closeModal();
  showToast('RDV supprimé');
  loadPageData('planning');
}

// ── ASSISTANT IA ──────────────────────────────────────────

const AI_CHIPS = {
  medecin:    ['Résume mes RDV du jour','Factures impayées ?','Stats du mois','Patients à revoir'],
  secretaire: ['Créneaux libres demain','Rappels du jour','Factures à émettre','Nouveaux patients']
};

function renderIA() {
  const el = document.getElementById('page-ia');
  const chips = AI_CHIPS[currentRole] || [];

  el.innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px solid var(--border)">
        <i class="ti ti-robot" style="color:var(--blue);font-size:18px"></i>
        <span style="font-size:13px;font-weight:500">Assistant IA — Cabinet Dr. Samichelly</span>
      </div>
      <div class="ai-chips">
        ${chips.map(c => `<button class="btn" style="font-size:12px" onclick="askAI('${c}')">${c} ↗</button>`).join('')}
      </div>
      <div class="ai-messages" id="ai-chat">
        <div class="ai-msg assistant">${currentRole === 'medecin'
          ? 'Bonjour Docteur. Je peux analyser votre planning, vos finances et répondre à vos questions cliniques.'
          : 'Bonjour. Je peux vous aider à gérer les RDV, les patients et les factures du cabinet.'}</div>
      </div>
      <div class="ai-input-row">
        <input class="ai-txt" id="ai-input" type="text" placeholder="Posez une question…" onkeydown="if(event.key==='Enter')sendAI()">
        <button class="btn btn-primary" onclick="sendAI()"><i class="ti ti-send"></i></button>
      </div>
    </div>`;
}

function askAI(q) {
  showPage('ia');
  setTimeout(() => {
    const inp = document.getElementById('ai-input');
    if (inp) { inp.value = q; sendAI(); }
  }, 100);
}

async function sendAI() {
  const inp = document.getElementById('ai-input');
  const msg = inp?.value.trim();
  if (!msg) return;
  inp.value = '';
  addAIMsg(msg, 'user');

  const thinking = document.createElement('div');
  thinking.className = 'ai-msg assistant';
  thinking.textContent = '…';
  thinking.id = 'ai-thinking';
  document.getElementById('ai-chat').appendChild(thinking);
  scrollAI();

  const stats = await getStatsMois();
  const system = currentRole === 'medecin'
    ? `Tu es l'assistant IA du Dr. Samichelly, chirurgien pédiatrique. Aide-le avec son planning, ses finances et ses patients. Données actuelles : ${stats.totalRdv} consultations ce mois, ${stats.revenus.toLocaleString('fr-FR')} DT de revenus, ${stats.totalPatients} patients actifs, ${stats.impayees} factures en attente. Réponds en français, de façon concise et professionnelle.`
    : `Tu es l'assistant de la secrétaire du cabinet du Dr. Samichelly (chirurgie pédiatrique, Tunis). Aide à la gestion administrative : RDV, patients, factures. Données : ${stats.totalRdv} RDV ce mois, ${stats.totalPatients} patients, ${stats.impayees} factures en attente. Réponds en français, de façon pratique et concise.`;

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system,
        messages: [{ role: 'user', content: msg }]
      })
    });
    const d = await r.json();
    document.getElementById('ai-thinking')?.remove();
    addAIMsg(d.content?.find(c => c.type === 'text')?.text || 'Désolé, réessayez.', 'assistant');
  } catch (e) {
    document.getElementById('ai-thinking')?.remove();
    addAIMsg('Erreur de connexion.', 'assistant');
  }
}

function addAIMsg(text, role) {
  const chat = document.getElementById('ai-chat');
  const div = document.createElement('div');
  div.className = 'ai-msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  scrollAI();
}

function scrollAI() {
  const c = document.getElementById('ai-chat');
  if (c) c.scrollTop = c.scrollHeight;
}

// Pages HTML vides à injecter dans le DOM
const PAGE_TEMPLATES = `
  <div class="page" id="page-dashboard-med"></div>
  <div class="page" id="page-dashboard-sec"></div>
  <div class="page" id="page-planning"></div>
  <div class="page" id="page-patients"></div>
  <div class="page" id="page-dossiers"></div>
  <div class="page" id="page-factures"></div>
  <div class="page" id="page-finances"></div>
  <div class="page" id="page-ia"></div>
`;

function launchApp() {
  // Injecter les pages
  document.getElementById('content-area').innerHTML = PAGE_TEMPLATES;

  // Cacher login, afficher app
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').classList.add('visible');

  // Configurer rôle
  const r = currentRole;
  document.getElementById('role-tag').textContent = r === 'medecin' ? 'Médecin' : 'Secrétaire';
  document.getElementById('role-tag').className = 'role-tag ' + r;

  const av = document.getElementById('user-av');
  av.textContent = r === 'medecin' ? 'DR' : 'SC';
  av.className = 'user-avatar ' + (r === 'medecin' ? 'av-m' : 'av-s');

  document.getElementById('user-name-badge').textContent =
    r === 'medecin' ? 'Dr. Samichelly' : 'Secrétariat';

  // Construire la navigation
  buildNav(r);

  // Pré-rendre la page IA (contenu statique)
  renderIA();

  // Aller sur le dashboard
  const firstPage = r === 'medecin' ? 'dashboard-med' : 'dashboard-sec';
  showPage(firstPage);
}

function buildNav(r) {
  const c = document.getElementById('nav-container');
  c.innerHTML = '';
  NAV_CONFIG[r].forEach(item => {
    if (item.section) {
      const s = document.createElement('div');
      s.className = 'nav-section';
      s.textContent = item.section;
      c.appendChild(s);
    } else {
      const d = document.createElement('div');
      d.className = 'nav-item';
      d.id = 'nav-' + item.id;
      d.innerHTML = `<i class="ti ${item.icon}" aria-hidden="true"></i>${item.label}`;
      d.onclick = () => showPage(item.id);
      c.appendChild(d);
    }
  });
}
